services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cvbe
      POSTGRES_USER: cvbe
      POSTGRES_PASSWORD: cvbe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvbe"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    env_file: .env.docker
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: .env.docker
    environment:
      # The model is downloaded once on the host and mounted read-only.
      EMBEDDING_MODEL: /models/bge-small-zh-v1.5
      EMBEDDING_LOCAL_FILES_ONLY: "true"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      RESUME_LAYOUT_HARD_GATE_ENABLED: "${RESUME_LAYOUT_HARD_GATE_ENABLED:-false}"
      RESUME_SPARSE_TEMPLATE_ENABLED: "${RESUME_SPARSE_TEMPLATE_ENABLED:-false}"
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
